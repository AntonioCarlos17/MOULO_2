<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
            # = id
            . = class
            : = pseudo-class
            :: = pseudo-element
            > = children
        */

        body{
            font-family: Arial, Helvetica, sans-serif;
            }
        a{
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: purple;
        }

        a:hover {
            text-decoration: underline;
        }
        a:active{
            color: yellow;
        }
        a::before{
            content: '⇒ ';
             text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }

        a::after{
            content: ' ⇐';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
    </style>
</head>
<body>
    <h1>Personalisando links</h1>
    <ul>
       <p></p>
        <li><a href="https://github.com/AntonioCarlos17" target="_blank">Repositório GitHub </a></li>
        <li><a href="https://www.youtube.com/watch?v=OAMbVlhdrlo&list=RDLYDESzzeeT4&index=6" target="_blank">Canal no YouTuBe </a></li>
        <li><a href="https://www.cursoemvideo.com/minha-conta/" target="_blank">Site curso em video </a></li>
    </ul>
</body>
</html>
