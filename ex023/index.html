<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consturindo tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            width: 100vh;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 600px;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
            
        }


        td {
            font-size: 2em;
            border: 1px solid black;
            padding: 5px;
            color: black;
            font-weight: bolder;
            vertical-align: top;/*Alinhamento vertical*/
            text-align: center;/*Alinhamento horizontal*/
        }

        footer {
            text-align: center;
            bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>TABELAS</h1>
    </header>
    <main>
        <h2>Minha primeira tabela</h2>
        <table>
            <tr><!-- linha 1 -->
                <td>A1</td>
                <td>B1</td>
                <td>C1</td>
            </tr>
            <tr class="linha"><!-- linha 2 -->
                <td>A2</td>
                <td>B2</td>
                <td>C2</td>
            </tr>
            <tr></tr><!-- linha 3 -->
                <td>A3</td>
                <td>B3</td>
                <td>C3</td>
            </tr>
            <tr><!-- linha 4 -->
                <td>A4</td>
                <td class="dado">B4</td>
                <td>C4</td>
            </tr>
        </table>

    </main>
    <footer>
        <p>Exercício 23 - Construindo tabelas</p>
    </footer>
</body>
</html>
