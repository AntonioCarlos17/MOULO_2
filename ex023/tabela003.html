<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 300px;
        }
        td{
            border: 1px solid red;
            padding: 10px;
            text-align: center;
        }
        footer {
            text-align: center;
            bottom: 10px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Mesclagem de células</h1>
        <table>
            <tr>
                <td>A</td>
                <td colspan="2">B</td>
                
            </tr>
            <tr>
                <td rowspan="3">D</td>
                <td>E</td>
                <td>F</td>
            </tr>
            <tr>
                
                <td>H</td>
                <td>I</td>
            </tr>
            <tr>
                
                <td>K</td>
                <td>L</td>
            </tr>
        </table>

    </main>
    <footer>
        <p>Exercício 23 - Construindo tabelas</p>
    </footer>
</body>
</html>
